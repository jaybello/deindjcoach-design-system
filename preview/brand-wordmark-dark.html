<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: #0A0A0A; padding: 28px 32px; }
  .row { display: flex; align-items: center; gap: 24px; }
  .logo { height: 56px; width: auto; }
  .meta { display: flex; flex-direction: column; gap: 4px; }
  .name { font-family: var(--font-display); font-weight: 900; color: var(--yellow); text-transform: uppercase; letter-spacing: -0.01em; font-size: 22px; line-height: 1; }
  .sub { font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--grey-mid); }
</style></head>
<body>
  <div class="row">
    <img class="logo" src="../assets/logos/dein-dj-coach-wht.png" alt="Dein DJ Coach">
    <div class="meta">
      <div class="name">Dein DJ Coach</div>
      <div class="sub">Hamburg · Coaching · Online-Kurse</div>
    </div>
  </div>
</body></html>
