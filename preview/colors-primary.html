<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--white); padding: 0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
  .sw { display: flex; flex-direction: column; min-height: 220px; }
  .chip { flex: 1; }
  .info { padding: 14px 16px; background: var(--white); }
  .name { font-family: var(--font-display); font-weight: 900; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--black); }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--grey-mid); margin-top: 4px; }
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:#FFD600"></div><div class="info"><div class="name">Yellow</div><div class="hex">#FFD600</div></div></div>
  <div class="sw"><div class="chip" style="background:#0A0A0A"></div><div class="info"><div class="name">Black</div><div class="hex">#0A0A0A</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF;border:1px solid #E5E5E5"></div><div class="info"><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
  <div class="sw"><div class="chip" style="background:#E5E5E5"></div><div class="info"><div class="name">Light Grey</div><div class="hex">#E5E5E5</div></div></div>
</body></html>
