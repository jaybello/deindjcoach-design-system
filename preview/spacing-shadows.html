<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--white); padding: 32px 28px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .swatch { width: 100px; height: 64px; background: var(--yellow); }
  .swatch.card { background: var(--white); border: 1px solid #eee; }
  .s-cta  { box-shadow: 0 8px 24px rgba(255,214,0,0.45); }
  .s-card { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .s-pop  { box-shadow: 0 18px 40px rgba(0,0,0,0.35); }
  .nm  { font-family: var(--font-display); font-weight:900; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--black); }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--grey-mid); }
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="swatch s-cta"></div><div class="nm">CTA glow</div><div class="tok">0 8 24 / yellow 25%</div></div>
    <div class="item"><div class="swatch card s-card"></div><div class="nm">Card lift</div><div class="tok">0 2 12 / black 8%</div></div>
    <div class="item"><div class="swatch card s-pop"></div><div class="nm">Pop / modal</div><div class="tok">0 24 60 / black 45%</div></div>
  </div>
</body></html>
