<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../components.css">
<style>
  body { background: var(--white); padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
  .panel { padding: 28px 32px; position: relative; min-height: 220px; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; }
  .a { background: var(--black); }
  .b { background: var(--grey-light); }
  .b.accent-strip::before { background: var(--black); }
  .h { font-family: var(--font-display); font-weight:900; text-transform: uppercase; font-size: 26px; line-height: 0.92; letter-spacing: -0.01em; }
  .a .h { color: var(--yellow); }
  .b .h { color: var(--black); }
  .t { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; margin-top: 12px; }
  .a .t { color: var(--grey-mid); }
  .b .t { color: rgba(0,0,0,0.45); }
</style></head>
<body>
  <div class="panel a accent-strip">
    <div class="h">Der häufigste<br>Fehler beim<br>Beatmatching</div>
    <div class="t">Yellow strip · left</div>
  </div>
  <div class="panel b accent-strip accent-strip--right">
    <div class="h">Timing<br>ist alles.</div>
    <div class="t">Black strip · right</div>
  </div>
</body></html>
