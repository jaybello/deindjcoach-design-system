<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: #fff; padding: 22px 28px; }
  .row { display: grid; grid-template-columns: 140px 1fr 70px; gap: 16px; align-items: baseline; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .row:last-child { border-bottom: none; }
  .label { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--grey-mid); }
  .sample-body { font-family: var(--font-body); font-weight: 400; font-size: 16px; line-height: 1.55; color: var(--black); }
  .sample-body-sm { font-family: var(--font-body); font-weight: 400; font-size: 14px; color: var(--grey-dark); }
  .sample-eyebrow { font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 700; color: var(--grey-mid); }
  .sample-mono { font-family: var(--font-mono); font-size: 13px; color: var(--black); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--grey-mid); text-align: right; }
</style></head>
<body>
  <div class="row"><div class="label">Eyebrow</div><div class="sample-eyebrow">Kurs · 2026 · Beatmatching</div><div class="meta">11 / .32em</div></div>
  <div class="row"><div class="label">Body</div><div class="sample-body">Lerne Timing, EQ-Mixing und saubere Übergänge.</div><div class="meta">16 / 155%</div></div>
  <div class="row"><div class="label">Body small</div><div class="sample-body-sm">Auf Basis solider Grundlagen.</div><div class="meta">14 / 150%</div></div>
  <div class="row"><div class="label">Mono / code</div><div class="sample-mono">--yellow: #FFD600;</div><div class="meta">13 px</div></div>
</body></html>
