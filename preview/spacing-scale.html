<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: #fff; padding: 28px; }
  .grid { display: flex; align-items: flex-end; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { background: var(--yellow); display: block; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--grey-mid); }
  .px { font-family: var(--font-display); font-weight: 900; font-size: 14px; color: var(--black); }
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="width:4px;height:24px"></div><div class="px">4</div><div class="tok">2xs</div></div>
    <div class="item"><div class="box" style="width:8px;height:32px"></div><div class="px">8</div><div class="tok">xs</div></div>
    <div class="item"><div class="box" style="width:16px;height:44px"></div><div class="px">16</div><div class="tok">sm</div></div>
    <div class="item"><div class="box" style="width:24px;height:56px"></div><div class="px">24</div><div class="tok">md</div></div>
    <div class="item"><div class="box" style="width:40px;height:72px"></div><div class="px">40</div><div class="tok">lg</div></div>
    <div class="item"><div class="box" style="width:64px;height:96px"></div><div class="px">64</div><div class="tok">xl</div></div>
    <div class="item"><div class="box" style="width:96px;height:120px"></div><div class="px">96</div><div class="tok">2xl</div></div>
  </div>
</body></html>
