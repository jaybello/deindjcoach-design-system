<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: #0A0A0A; padding: 32px; position: relative; overflow: hidden; }
  body::before { content:''; position:absolute; top:-180px; right:-180px; width:400px; height:400px; border-radius:50%; background:#FFD600; opacity:0.07; }
  .eyebrow { font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--yellow); margin-bottom: 12px; }
  .h { font-family: var(--font-display); font-weight: 900; text-transform: uppercase; font-size: 72px; line-height: 0.88; letter-spacing: -0.02em; color: var(--yellow); }
  .h span { display: block; color: var(--white); }
  .meta { margin-top: 18px; font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--grey-mid); display: flex; gap: 24px; }
</style></head>
<body>
  <div class="eyebrow">Display · Klein Black · 900</div>
  <div class="h">Von 0<span>auf CDJs</span></div>
  <div class="meta"><span>72 / 88% LH</span><span>Tracking −2%</span><span>UPPERCASE</span></div>
</body></html>
