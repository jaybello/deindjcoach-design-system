<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: #fff; padding: 0; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
  .combo { padding: 22px 18px; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between; }
  .h { font-family: var(--font-display); font-weight: 900; text-transform: uppercase; font-size: 22px; line-height: 0.9; letter-spacing: -0.02em; }
  .t { font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase; opacity: 0.5; }
  .a { background: #0A0A0A; color: #FFD600; }
  .b { background: #FFD600; color: #0A0A0A; }
  .c { background: #0A0A0A; color: #FFFFFF; }
  .d { background: #FFFFFF; color: #0A0A0A; border: 1px solid #E5E5E5; }
  .e { background: #E5E5E5; color: #0A0A0A; }
</style></head>
<body>
  <div class="combo a"><div class="h">Gelb auf<br>Schwarz</div><div class="t">01 · Primär</div></div>
  <div class="combo b"><div class="h">Schwarz auf<br>Gelb</div><div class="t">02 · CTA</div></div>
  <div class="combo c"><div class="h">Weiss auf<br>Schwarz</div><div class="t">03 · Body</div></div>
  <div class="combo d"><div class="h">Schwarz auf<br>Weiss</div><div class="t">04 · Clean</div></div>
  <div class="combo e"><div class="h">Schwarz auf<br>Grau</div><div class="t">05 · Neutral</div></div>
</body></html>
