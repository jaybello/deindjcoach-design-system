<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../components.css">
<style>
  body { background: #0A0A0A; padding: 22px 28px; }
  .bar { display: flex; align-items: center; gap: 28px; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .brand { font-family: var(--font-display); font-weight:900; font-size: 15px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--yellow); }
  .links { display: flex; gap: 22px; flex: 1; margin-left: 32px; color: var(--white); }
  .demo { margin-top: 18px; display: flex; gap: 28px; align-items: baseline; }
  .demo .state { font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--grey-mid); width: 70px; }
</style></head>
<body>
  <div class="bar">
    <div class="brand">Dein DJ Coach</div>
    <div class="links">
      <a class="nav-link nav-link--active">Kurse</a>
      <a class="nav-link">Coaching</a>
      <a class="nav-link">Über</a>
      <a class="nav-link">Blog</a>
    </div>
    <a class="btn btn--primary btn--sm">Login</a>
  </div>
  <div class="demo">
    <div class="state">Default</div><a class="nav-link">Kurse</a>
    <div class="state">Hover</div><a class="nav-link" style="color:var(--yellow)">Kurse</a>
    <div class="state">Active</div><a class="nav-link nav-link--active">Kurse</a>
  </div>
</body></html>
