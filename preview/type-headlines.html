<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: #fff; color: #0A0A0A; padding: 24px 28px; }
  .h1 { font-family: var(--font-display); font-weight:900; text-transform:uppercase; font-size: 44px; line-height: 0.95; letter-spacing:-0.02em; }
  .h2 { font-family: var(--font-display); font-weight:900; text-transform:uppercase; font-size: 28px; line-height: 1; letter-spacing:-0.01em; margin-top: 12px; }
  .h3 { font-family: var(--font-display); font-weight:700; text-transform:uppercase; font-size: 18px; line-height: 1.1; margin-top: 10px; color: var(--grey-dark); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--grey-mid); float: right; line-height: 1.6; padding-left: 16px; }
  .row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
</style></head>
<body>
  <div class="row"><div class="h1">Lern DJing</div><div class="meta">H1 · 44 / 95%</div></div>
  <div class="row"><div class="h2">Der strukturierte Einstieg</div><div class="meta">H2 · 28 / 100%</div></div>
  <div class="row"><div class="h3">Klein Bold subhead</div><div class="meta">H3 · 18 / 110%</div></div>
</body></html>
