<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../components.css">
<style>
  body { background: #0A0A0A; padding: 24px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
</style></head>
<body>
  <div class="field">
    <label class="field-label">Vorname</label>
    <input class="input" placeholder="Lukas">
  </div>
  <div class="field">
    <label class="field-label">E-Mail</label>
    <input class="input" value="lukas@example.de" style="border-color: var(--yellow);">
  </div>
  <div class="field" style="grid-column: 1 / -1;">
    <label class="field-label">Was möchtest du lernen?</label>
    <textarea class="textarea" rows="2" placeholder="Beatmatching, EQ-Mixing, Phrasing…"></textarea>
  </div>
</body></html>
